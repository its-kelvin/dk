<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Auth | Connect with Us</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-dark dark:bg-dark dark:text-white min-h-screen flex flex-col selection:bg-primary/20 transition-colors duration-300">
    <!-- Navbar (Global) -->
    <nav id="navbar" class="sticky top-0 z-[100] w-full glass-header transition-all duration-300">
        <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="index.html" class="flex items-center space-x-3 group">
                <div class="relative">
                    <div class="absolute -inset-1 bg-gradient-to-r from-primary to-blue-400 rounded-lg blur opacity-25 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
                    <svg class="relative h-10 w-10 text-primary bg-white dark:bg-dark p-1.5 rounded-lg shadow-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0" stroke-linecap="round"></path>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0" stroke-linecap="round"></path>
                        <path d="M8.59 16.11a6 6 0 0 1 6.82 0" stroke-linecap="round"></path>
                        <line x1="12" y1="20" x2="12.01" y2="20" stroke-linecap="round"></line>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-2xl font-black tracking-tighter leading-none">AURA NETS</span>
                    <span class="text-[10px] uppercase font-bold tracking-[0.2em] text-primary/80">Connect Fast</span>
                </div>
            </a>
            <div>
                <button id="themeToggle" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                    <svg id="sunIcon" class="hidden h-5 w-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg id="moonIcon" class="h-5 w-5 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center py-20 px-4">
        <div class="max-w-md w-full" data-aos="fade-up">
            <div class="bg-gray-50 dark:bg-gray-900 p-10 md:p-14 rounded-[3.5rem] border border-gray-100 dark:border-gray-800 shadow-3xl">
                <div class="text-center mb-10">
                    <h1 id="authTitle" class="text-3xl font-black uppercase tracking-tighter mb-4">Welcome <span class="text-primary italic">Back.</span></h1>
                    <p id="authSubtitle" class="text-secondary text-sm font-medium">Log in to manage your WiFi, CCTV, and tech orders.</p>
                </div>

                <!-- Form -->
                <form id="authForm" class="space-y-6">
                    <div id="registerFields" class="hidden space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Full Name</label>
                            <input type="text" name="fullName" placeholder="John Doe" class="w-full px-6 py-4 bg-white dark:bg-dark border border-gray-100 dark:border-gray-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Email Address</label>
                        <input type="email" name="email" required placeholder="john@example.com" class="w-full px-6 py-4 bg-white dark:bg-dark border border-gray-100 dark:border-gray-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary transition-all">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Password</label>
                        <input type="password" name="password" required placeholder="••••••••" class="w-full px-6 py-4 bg-white dark:bg-dark border border-gray-100 dark:border-gray-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary transition-all">
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="authBtn" class="w-full py-5 bg-primary text-white font-black rounded-2xl hover:bg-blue-600 transition-all shadow-2xl shadow-primary/20 uppercase tracking-tighter">Login Now</button>
                    </div>
                </form>

                <!-- Toggle -->
                <div class="mt-8 text-center text-sm">
                    <p class="text-secondary font-medium" id="toggleText">Don't have an account? <button onclick="toggleAuth()" class="text-primary font-bold hover:underline">Register</button></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-[10px] font-bold text-secondary uppercase tracking-[0.25em]">
        &copy; 2026 Aura Networks Ltd.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="utils.js"></script>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { Auth } from "./auth.js";
        AOS.init({ duration: 800, once: true });
        let isLogin = true;

        window.toggleAuth = function() {
            isLogin = !isLogin;
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const regFields = document.getElementById('registerFields');
            const btn = document.getElementById('authBtn');
            const toggleText = document.getElementById('toggleText');

            if (isLogin) {
                title.innerHTML = 'Welcome <span class="text-primary italic">Back.</span>';
                subtitle.textContent = 'Log in to manage your WiFi, CCTV, and tech orders.';
                regFields.classList.add('hidden');
                btn.textContent = 'Login Now';
                toggleText.innerHTML = 'Don\'t have an account? <button onclick="window.toggleAuth()" class="text-primary font-bold hover:underline">Register</button>';
            } else {
                title.innerHTML = 'Join <span class="text-primary italic">Aura.</span>';
                subtitle.textContent = 'Create an account to start your smart tech journey.';
                regFields.classList.remove('hidden');
                btn.textContent = 'Create Account';
                toggleText.innerHTML = 'Already have an account? <button onclick="window.toggleAuth()" class="text-primary font-bold hover:underline">Login</button>';
            }
        };

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const user = {
                email: formData.get('email'),
                username: formData.get('fullName') || formData.get('email').split('@')[0],
                role: 'customer'
            };
            
            Auth.saveUser(user);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
