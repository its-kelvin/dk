<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Auth | Connect with Us</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
</head>

<body
    class="bg-white text-dark dark:bg-dark dark:text-white min-h-screen flex flex-col selection:bg-primary/20 transition-colors duration-300">

    <div id="header-placeholder"></div>

    <main class="flex-1 flex items-center justify-center py-10 px-4">
        <div class="w-full max-w-sm">
            <div class="bg-white border border-gray-100 shadow-md rounded-2xl p-8">
                <div class="text-center mb-6">
                    <h1 id="authTitle" class="text-2xl font-black uppercase tracking-tight mb-1">Welcome <span
                            class="text-primary italic">Back.</span></h1>
                    <p id="authSubtitle" class="text-secondary text-xs font-medium">Log in to manage your WiFi, CCTV,
                        and tech orders.</p>
                </div>

                <!-- Form -->
                <form id="authForm" class="space-y-4">
                    <div id="registerFields" class="hidden">
                        <div class="mb-4">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="fullName" placeholder="John Doe" class="form-input">
                        </div>
                    </div>

                    <div>
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" required placeholder="john@example.com" class="form-input">
                    </div>

                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" name="password" required placeholder="••••••••" class="form-input">
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="authBtn"
                            class="w-full py-3 bg-primary text-white font-bold rounded-xl hover:bg-blue-600 transition-colors text-sm uppercase tracking-wide">Login
                            Now</button>
                    </div>
                </form>

                <!-- Toggle -->
                <div class="mt-5 text-center text-xs">
                    <p class="text-secondary font-medium" id="toggleText">Don't have an account? <button
                            onclick="toggleAuth()" class="text-primary font-bold hover:underline">Register</button></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="utils.js"></script>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { Auth } from "./auth.js";
        AOS.init({ duration: 400, once: true });
        let isLogin = true;

        window.toggleAuth = function () {
            isLogin = !isLogin;
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const regFields = document.getElementById('registerFields');
            const btn = document.getElementById('authBtn');
            const toggleText = document.getElementById('toggleText');

            if (isLogin) {
                title.innerHTML = 'Welcome <span class="text-primary italic">Back.</span>';
                subtitle.textContent = 'Log in to manage your WiFi, CCTV, and tech orders.';
                regFields.classList.add('hidden');
                btn.textContent = 'Login Now';
                toggleText.innerHTML = 'Don\'t have an account? <button onclick="window.toggleAuth()" class="text-primary font-bold hover:underline">Register</button>';
            } else {
                title.innerHTML = 'Join <span class="text-primary italic">Aura.</span>';
                subtitle.textContent = 'Create an account to start your smart tech journey.';
                regFields.classList.remove('hidden');
                btn.textContent = 'Create Account';
                toggleText.innerHTML = 'Already have an account? <button onclick="window.toggleAuth()" class="text-primary font-bold hover:underline">Login</button>';
            }
        };

        document.getElementById('authForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const user = {
                email: formData.get('email'),
                username: formData.get('fullName') || formData.get('email').split('@')[0],
                role: 'customer'
            };

            Auth.saveUser(user);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
