<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FORTUNE DK</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' } } }
        }
    </script>

<body class="bg-white text-dark min-h-screen flex flex-col">
    <div id="header-placeholder"></div>

    <main class="flex-1 flex items-center py-12">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-black uppercase tracking-tighter leading-none mb-2">Contact <span
                        class="text-primary italic">Us.</span></h1>
                <p class="text-secondary font-medium">Get in touch with our technical team today.</p>
            </div>

            <div class="bg-gray-50 border border-gray-100 rounded-3xl p-6 lg:p-10 shadow-sm max-w-7xl mx-auto">
                <form id="contactForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="form-label">Full Name</label>
                        <input type="text" required placeholder="Kelvin K..." class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Phone</label>
                        <input type="tel" required placeholder="2547..." class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" required placeholder="kelvin@example.com" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">County</label>
                        <input type="text" required placeholder="Nairobi" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Nearest Town</label>
                        <input type="text" required placeholder="Westlands" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Service Type</label>
                        <select class="form-input">
                            <option>WiFi Installation</option>
                            <option>CCTV Security</option>
                            <option>Networking Store</option>
                            <option>Maintenance</option>
                        </select>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="form-label">How can we help?</label>
                        <input type="text" placeholder="Brief description of your inquiry" class="form-input">
                    </div>
                    <div class="md:col-span-2 lg:col-span-4 mt-2">
                        <button type="submit"
                            class="w-full py-3 bg-primary text-white font-bold rounded-xl hover:bg-blue-600 transition-colors uppercase tracking-widest text-sm shadow-lg shadow-primary/20">Send
                            Message</button>
                    </div>
                </form>
                <p id="contactSuccess" class="hidden text-green-600 font-bold text-center mt-4">✅ Message sent! We'll be
                    in touch soon.</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="utils.js"></script>
    <script src="cart.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('contactSuccess').classList.remove('hidden');
            if (window.Cart) window.Cart.notify('Message received!');
            this.reset();
        });
    </script>
</body>

</html>
