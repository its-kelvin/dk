<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTUNE DK CCTV | Smart Security Solutions</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        .flip-card {
            perspective: 1000px;
            height: 280px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body class="bg-white text-dark min-h-screen flex flex-col selection:bg-primary/20">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1">
        <section class="py-10 bg-gray-50 dark:bg-dark">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl font-black tracking-tighter uppercase mb-1">FORTUNE DK <span
                                class="text-primary italic">Security.</span></h1>
                        <p class="text-secondary text-sm font-medium">Professional CCTV systems — high-resolution,
                            AI-powered, and always on.</p>
                    </div>

                    <!-- Search Input -->
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="Search cameras..."
                            class="w-full sm:w-64 pl-10 pr-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-primary">
                        <svg class="absolute left-3 top-2.5 h-4 w-4 text-secondary" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>

                <!-- Category Filters -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="setCategory('All', this)"
                        class="category-btn active px-4 py-2 text-xs font-bold rounded-xl border border-primary bg-primary text-white transition-all">All</button>
                    <button onclick="setCategory('Dome Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">Dome
                        Cameras</button>
                    <button onclick="setCategory('Bullet Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">Bullet
                        Cameras</button>
                    <button onclick="setCategory('PTZ Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">PTZ
                        Cameras</button>
                    <button onclick="setCategory('IP/Wireless Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">IP/Wireless
                        Cameras</button>
                </div>

                <!-- Products Grid -->
                <div id="camera-list" class="product-grid-layout">
                    <!-- Dynamically populated by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Installation Info -->
        <section class="py-12 border-t border-gray-100 dark:border-gray-900">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                    <!-- Installation content unchanged -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="utils.js"></script>
    <script src="cart.js"></script>

    <!-- UI & Filter Logic (Standard Script for better reliability) -->
    <script>
        let currentCategory = 'All';

        // Dynamic Rendering Function
        function renderCCTVProducts(products) {
            const grid = document.getElementById('camera-list');
            if (!grid) return;

            grid.innerHTML = products.map(p => `
                <div class="camera-item product-card flip-card" data-category="${p.category}" data-name="${p.name}">
                    <div class="flip-card-inner">
                        <!-- Front -->
                        <div class="flip-card-front bg-gray-50 dark:bg-gray-900 rounded-2xl p-3 border border-gray-100 dark:border-gray-800 shadow-sm">
                            <div class="aspect-[4/3] rounded-xl overflow-hidden mb-3 bg-white dark:bg-dark relative">
                                <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                            </div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-primary mb-1 block">${p.category}</span>
                            <h3 class="text-sm font-extrabold mb-0.5 leading-tight">${p.shortName || p.name}</h3>
                            <p class="text-secondary text-[10px] mb-2 line-clamp-2">${p.description}</p>
                            <div class="mt-auto flex items-center justify-between">
                                <span class="text-sm font-black text-dark dark:text-white">KES ${p.price.toLocaleString()}</span>
                                <div class="flex gap-2">
                                    <button onclick="toggleFeatures(this)" class="p-2 text-secondary hover:text-primary border border-gray-200 rounded-lg"><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
                                    <button data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image}" class="add-to-cart-btn p-2 bg-white dark:bg-dark rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition-all"><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" /></svg></button>
                                </div>
                            </div>
                        </div>
                        <!-- Back -->
                        <div class="flip-card-back bg-white dark:bg-gray-800 rounded-2xl p-3 border-2 border-primary shadow-xl overflow-hidden">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xs font-black uppercase text-primary">Features</h3>
                                <button onclick="toggleFeatures(this)" class="p-1 text-secondary hover:text-primary"><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                            </div>
                            <div class="flex-1 overflow-y-auto">
                                <ul class="space-y-1 text-[10px] text-dark dark:text-gray-200 font-medium">
                                    ${p.features.map(f => `<li class="border-b border-gray-50 dark:border-gray-700 pb-0.5">• ${f}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="mt-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                                <button data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image}" class="add-to-cart-btn w-full py-2 bg-primary text-white text-xs font-bold rounded-xl hover:bg-blue-600 transition-all flex justify-center items-center gap-2">
                                    <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" /></svg> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.setCategory = function (category, btn) {
            currentCategory = category;

            // Update button styles
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active', 'bg-primary', 'text-white', 'border-primary');
                b.classList.add('bg-white', 'text-dark', 'border-gray-200');
            });
            btn.classList.add('active', 'bg-primary', 'text-white', 'border-primary');
            btn.classList.remove('bg-white', 'text-dark', 'border-gray-200');

            filterCameras();
        };

        window.toggleFeatures = function (btn) {
            const card = btn.closest('.camera-item');
            card.classList.toggle('flipped');
        };

        window.filterCameras = function () {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            document.querySelectorAll('.camera-item').forEach(item => {
                const name = item.dataset.name.toLowerCase();
                const category = item.dataset.category;

                const matchesSearch = name.includes(searchTerm);
                const matchesCategory = currentCategory === 'All' || category === currentCategory;

                if (matchesSearch && matchesCategory) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        };

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.addEventListener('input', filterCameras);

            // Initialize AOS and Year
            if (typeof AOS !== 'undefined') AOS.init({ duration: 400, once: true });
            if (document.getElementById('year')) document.getElementById('year').textContent = new Date().getFullYear();
        });
    </script>

    <!-- Firebase Logic (Kept as module) -->
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { Auth } from "./auth.js";
        import { cctvProducts } from "./cctv-data.js";

        renderCCTVProducts(cctvProducts);
    </script>
</body>

</html>
