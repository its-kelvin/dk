<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTUNE DK CCTV | Smart Security Solutions</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
</head>

<body class="bg-white text-dark min-h-screen flex flex-col selection:bg-primary/20">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1">
        <section class="py-10 bg-gray-50 dark:bg-dark">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="mb-8">
                    <h1 class="text-3xl font-black tracking-tighter uppercase mb-1">Aura <span
                            class="text-primary italic">Security.</span></h1>
                    <p class="text-secondary text-sm font-medium">Professional CCTV systems — high-resolution,
                        AI-powered, and always on.</p>
                </div>

                <!-- Category Filters -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="filterCameras('All')"
                        class="px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">All</button>
                    <button onclick="filterCameras('IP Cameras')"
                        class="px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">IP
                        Cameras</button>
                    <button onclick="filterCameras('Analog Cameras')"
                        class="px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">Analog</button>
                    <button onclick="filterCameras('Wireless Cameras')"
                        class="px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">Wireless</button>
                    <button onclick="filterCameras('PTZ Cameras')"
                        class="px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white hover:border-primary hover:text-primary transition-all">PTZ</button>
                </div>

                <!-- Products Grid -->
                <div id="camera-list" class="product-grid-layout">
                    <!-- CCTV items remain unchanged -->
                </div>
            </div>
        </section>

        <!-- Installation Info -->
        <section class="py-12 border-t border-gray-100 dark:border-gray-900">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                    <!-- Installation content unchanged -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="utils.js"></script>
    <script src="cart.js"></script>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { Auth } from "./auth.js";
        AOS.init({ duration: 400, once: true });
        document.getElementById('year').textContent = new Date().getFullYear();

        window.filterCameras = function (category) {
            document.querySelectorAll('.camera-item').forEach(item => {
                if (item.dataset.category === category || category === 'All') {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        };
    </script>
</body>

</html>
