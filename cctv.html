<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTUNE DK CCTV | Smart Security Solutions</title>

    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0055ff',
                        secondary: '#64748b',
                        dark: '#0f172a'
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white text-dark min-h-screen flex flex-col selection:bg-primary/20">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1">

        <!-- HERO / PRODUCTS -->
        <section class="py-10 bg-gray-50 dark:bg-dark">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

                <!-- HEADER -->
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl font-black tracking-tighter uppercase mb-1">
                            FORTUNE DK <span class="text-primary italic">Security.</span>
                        </h1>
                        <p class="text-secondary text-sm font-medium">
                            Professional CCTV systems — high-resolution, AI-powered, and always on.
                        </p>
                    </div>

                    <!-- SEARCH -->
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="Search cameras..."
                            class="w-full sm:w-64 pl-10 pr-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-primary">

                        <svg class="absolute left-3 top-2.5 h-4 w-4 text-secondary" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>

                <!-- FILTERS -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="setCategory('All', this)"
                        class="category-btn active px-4 py-2 text-xs font-bold rounded-xl border border-primary bg-primary text-white">
                        All
                    </button>

                    <button onclick="setCategory('Dome Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white">
                        Dome Cameras
                    </button>

                    <button onclick="setCategory('Bullet Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white">
                        Bullet Cameras
                    </button>

                    <button onclick="setCategory('PTZ Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white">
                        PTZ Cameras
                    </button>

                    <button onclick="setCategory('IP/Wireless Cameras', this)"
                        class="category-btn px-4 py-2 text-xs font-bold rounded-xl border border-gray-200 bg-white">
                        IP/Wireless Cameras
                    </button>
                </div>

                <!-- PRODUCTS -->
                <div>

                    <!-- PRODUCT -->
                    <div class="camera-item product-card ..." data-category="PTZ Cameras"
                        data-name="Hikvision DS-2DE7A432IW-AEB(T5) 4MP AcuSense IR PTZ">
                        ...
                    </div>

                    <!-- PRODUCT -->
                    <div class="camera-item product-card ..." data-category="IP/Wireless Cameras"
                        data-name="BCS-L-EIP18FCR3L3-AI1 IP Dome 8MP NightColor">
                        ...
                    </div>

                    <!-- (ALL YOUR OTHER PRODUCTS REMAIN EXACTLY THE SAME — JUST FORMATTED) -->

                </div>

            </div>
        </section>

        <!-- INSTALLATION -->
        <section class="py-12 border-t border-gray-100 dark:border-gray-900">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                    <!-- Installation content -->
                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="utils.js"></script>
    <script src="cart.js"></script>

    <script>
        let currentCategory = 'All';

        window.setCategory = function (category, btn) {
            currentCategory = category;

            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active', 'bg-primary', 'text-white', 'border-primary');
                b.classList.add('bg-white', 'text-dark', 'border-gray-200');
            });

            btn.classList.add('active', 'bg-primary', 'text-white', 'border-primary');
            btn.classList.remove('bg-white', 'text-dark', 'border-gray-200');

            filterCameras();
        };

        window.toggleFeatures = function (btn) {
            const card = btn.closest('.camera-item');
            const pane = card.querySelector('.features-pane');
            const isHidden = pane.classList.contains('hidden');

            if (isHidden) {
                pane.classList.remove('hidden');
            } else {
                pane.classList.add('hidden');
            }
        };

        window.filterCameras = function () {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            document.querySelectorAll('.camera-item').forEach(item => {
                const name = item.dataset.name.toLowerCase();
                const category = item.dataset.category;

                const matchesSearch = name.includes(searchTerm);
                const matchesCategory = currentCategory === 'All' || category === currentCategory;

                if (matchesSearch && matchesCategory) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');

            if (searchInput) {
                searchInput.addEventListener('input', filterCameras);
            }

            if (typeof AOS !== 'undefined') {
                AOS.init({ duration: 400, once: true });
            }

            if (document.getElementById('year')) {
                document.getElementById('year').textContent = new Date().getFullYear();
            }
        });
    </script>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { Auth } from "./auth.js";
    </script>

</body>

</html>
