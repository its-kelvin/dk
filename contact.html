<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Aura Networks</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0055ff', secondary: '#64748b', dark: '#0f172a' } } }
        }
    </script>
</head>

<body class="bg-white text-dark min-h-screen flex flex-col">
    <div id="header-placeholder"></div>

    <main class="flex-1 py-16 px-4">
        <div class="max-w-4xl mx-auto">

            <h1 class="text-4xl font-black uppercase tracking-tighter mb-6">
                Contact <span class="text-primary italic">Us.</span>
            </h1>

            <p class="text-secondary mb-10 max-w-xl">
                Have questions, need installation, or want to book a technician? Fill out the form below and our team
                will contact you shortly.
            </p>

            <form id="contactForm" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 p-8 rounded-2xl shadow-sm">

                <!-- Full Name -->
                <div class="md:col-span-1">
                    <label class="text-sm font-bold uppercase text-secondary">Full Name</label>
                    <input type="text" required
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- Phone -->
                <div class="md:col-span-1">
                    <label class="text-sm font-bold uppercase text-secondary">Phone Number</label>
                    <input type="tel" required placeholder="2547XXXXXXXX"
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- Email -->
                <div class="md:col-span-2">
                    <label class="text-sm font-bold uppercase text-secondary">Email Address</label>
                    <input type="email" required
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- Country -->
                <div>
                    <label class="text-sm font-bold uppercase text-secondary">Country</label>
                    <input type="text" required value="Kenya"
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- County -->
                <div>
                    <label class="text-sm font-bold uppercase text-secondary">County</label>
                    <input type="text" required placeholder="e.g. Nairobi"
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- Town -->
                <div class="md:col-span-2">
                    <label class="text-sm font-bold uppercase text-secondary">Nearest Town</label>
                    <input type="text" required
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- Service Type -->
                <div class="md:col-span-2">
                    <label class="text-sm font-bold uppercase text-secondary">Service Type</label>
                    <select required
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Select a service</option>
                        <option>WiFi Installation</option>
                        <option>CCTV Installation</option>
                        <option>Networking Setup</option>
                        <option>Maintenance / Repair</option>
                        <option>Device Inquiry</option>
                    </select>
                </div>

                <!-- Message -->
                <div class="md:col-span-2">
                    <label class="text-sm font-bold uppercase text-secondary">Message</label>
                    <textarea rows="4" placeholder="Describe your request..."
                        class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none"></textarea>
                </div>

                <!-- Submit -->
                <div class="md:col-span-2">
                    <button type="submit"
                        class="w-full bg-primary text-white py-3 rounded-lg font-bold uppercase tracking-wide hover:opacity-90 transition">
                        Submit Request
                    </button>
                </div>

                <!-- Success Message -->
                <p id="successMsg" class="hidden text-green-600 font-bold text-center md:col-span-2">
                    ✅ Your request has been submitted. We will contact you shortly.
                </p>

            </form>

        </div>
    </main>

    <footer class="w-full border-t border-gray-100 bg-gray-50 py-12">
        <div class="mx-auto max-w-7xl px-4 text-center">
            <p class="text-xs text-secondary font-bold uppercase tracking-widest">
                &copy; 2026 Aura Networks Ltd. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        const form = document.getElementById("contactForm");
        const successMsg = document.getElementById("successMsg");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Simulate submission (replace with Firebase later)
            successMsg.classList.remove("hidden");
            form.reset();
        });
    </script>

</body>

</html>
